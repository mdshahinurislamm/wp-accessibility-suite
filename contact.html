<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Accessibility Suite — Make Your WordPress Site Accessible for Everyone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS ──────────────────────────────────────────────────────────── */
  :root {
    --ink:     #0a0a14;
    --paper:   #f5f3ee;
    --cream:   #faf8f3;
    --accent:  #2563ff;
    --gold:    #f5a623;
    --pro:     #7c3aed;
    --pro-lt:  #ede9fe;
    --green:   #16a34a;
    --red:     #dc2626;
    --muted:   #6b7280;
    --border:  #e5e1d8;
    --card:    #ffffff;
    --shadow:  0 2px 24px rgba(10,10,20,.08);
    --shadow-lg: 0 12px 48px rgba(10,10,20,.14);
    --r:       14px;
    --r-sm:    8px;
  }

  /* ── RESET ───────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.65;
    overflow-x: hidden;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }

  /* ── TYPOGRAPHY ──────────────────────────────────────────────────────── */
  .display {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -.03em;
  }
  .serif { font-family: 'Fraunces', serif; font-weight: 300; font-style: italic; }

  /* ── LAYOUT ──────────────────────────────────────────────────────────── */
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
  section { padding: 96px 0; }

  /* ── NAV ─────────────────────────────────────────────────────────────── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,243,238,.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .nav-inner {
    max-width: 1160px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 24px;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px;
  }
  .nav-logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--muted);
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-cta {
    background: var(--ink); color: #fff !important;
    padding: 9px 20px; border-radius: 50px;
    font-size: 13px; font-weight: 600;
    transition: transform .2s, box-shadow .2s;
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(10,10,20,.2); }

  /* ── HERO ────────────────────────────────────────────────────────────── */
  .hero {
    padding: 80px 0 64px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 60% -10%, rgba(37,99,255,.1) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 80%, rgba(245,166,35,.08) 0%, transparent 50%);
  }
  .hero-grid-lines {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(10,10,20,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,20,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,.4) 30%, rgba(0,0,0,.4) 70%, transparent);
  }
  .hero-inner {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(37,99,255,.08); border: 1px solid rgba(37,99,255,.2);
    color: var(--accent); border-radius: 50px;
    font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    padding: 6px 14px; margin-bottom: 24px;
  }
  .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
  .hero h1 {
    font-size: clamp(40px, 5vw, 68px);
    margin-bottom: 24px;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero-sub {
    font-size: 18px; color: var(--muted); max-width: 480px;
    margin-bottom: 40px; font-weight: 300; line-height: 1.7;
  }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 50px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; border: none; transition: all .2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(37,99,255,.3); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,255,.4); }
  .btn-pro {
    background: linear-gradient(135deg, var(--pro), #4f46e5);
    color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,.3);
  }
  .btn-pro:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,.4); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--ink); background: rgba(10,10,20,.04); }
  .hero-stats {
    display: flex; gap: 32px; margin-top: 48px; padding-top: 32px;
    border-top: 1px solid var(--border);
  }
  .hero-stat-num { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 900; color: var(--ink); }
  .hero-stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }

  /* Hero visual */
  .hero-visual {
    position: relative;
  }
  .hero-mockup {
    background: var(--ink);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.06);
    aspect-ratio: 4/3;
    position: relative;
  }
  .mockup-topbar {
    background: #1a1a2e; padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
  .mockup-content { padding: 20px; }
  .mockup-toolbar-btn {
    position: absolute; bottom: 24px; right: 24px;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 22px;
    box-shadow: 0 4px 20px rgba(37,99,255,.5);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .mockup-panel {
    position: absolute; bottom: 88px; right: 24px;
    background: #fff; border-radius: 14px;
    width: 200px; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
    animation: slideUp .6s ease both .3s;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .panel-head { background: var(--accent); color: #fff; padding: 10px 14px; font-size: 12px; font-weight: 700; }
  .panel-row { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; font-size: 11px; font-weight: 500; }
  .panel-pill { background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
  .panel-pill.pro { background: var(--pro); }
  .panel-pill.on { background: #16a34a; }
  .floating-badge {
    position: absolute; top: -12px; left: -12px;
    background: var(--gold); color: var(--ink);
    border-radius: 50px; padding: 6px 14px;
    font-size: 12px; font-weight: 700;
    box-shadow: 0 4px 16px rgba(245,166,35,.4);
    animation: float 3s ease-in-out infinite .5s;
  }
  .floating-badge2 {
    position: absolute; top: 40px; right: -16px;
    background: var(--green); color: #fff;
    border-radius: 50px; padding: 6px 14px;
    font-size: 12px; font-weight: 700;
    box-shadow: 0 4px 16px rgba(22,163,74,.4);
    animation: float 3s ease-in-out infinite 1s;
  }

  /* ── TRUST BAR ───────────────────────────────────────────────────────── */
  .trust-bar {
    padding: 32px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    background: var(--cream);
  }
  .trust-bar-inner {
    display: flex; align-items: center; justify-content: center;
    gap: 40px; flex-wrap: wrap;
  }
  .trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--muted); }
  .trust-icon { font-size: 18px; }

  /* ── SECTION HEADERS ─────────────────────────────────────────────────── */
  .section-tag {
    display: inline-block;
    background: rgba(37,99,255,.08); color: var(--accent);
    border: 1px solid rgba(37,99,255,.15);
    border-radius: 50px; font-size: 11px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; padding: 5px 14px;
    margin-bottom: 16px;
  }
  .section-tag.pro-tag { background: var(--pro-lt); color: var(--pro); border-color: rgba(124,58,237,.2); }
  .section-title { font-size: clamp(28px, 3.5vw, 44px); margin-bottom: 16px; }
  .section-sub { font-size: 17px; color: var(--muted); max-width: 560px; font-weight: 300; line-height: 1.7; }
  .section-head { text-align: center; margin-bottom: 64px; }
  .section-head .section-sub { margin: 0 auto; }

  /* ── FREE FEATURES GRID ──────────────────────────────────────────────── */
  .features-bg { background: var(--cream); }
  .features-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  .feat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 28px;
    transition: transform .2s, box-shadow .2s;
    position: relative; overflow: hidden;
  }
  .feat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), #60a5fa);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s;
  }
  .feat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .feat-card:hover::before { transform: scaleX(1); }
  .feat-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: rgba(37,99,255,.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 16px;
  }
  .feat-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .feat-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* ── PRO FEATURES ────────────────────────────────────────────────────── */
  .pro-section { background: var(--ink); color: #fff; position: relative; overflow: hidden; }
  .pro-bg-orb {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,.4), transparent 70%);
    pointer-events: none;
  }
  .pro-bg-orb.orb1 { width: 600px; height: 600px; top: -200px; right: -100px; }
  .pro-bg-orb.orb2 { width: 400px; height: 400px; bottom: -150px; left: -100px; background: radial-gradient(circle, rgba(37,99,255,.3), transparent 70%); }
  .pro-section .section-tag { background: rgba(124,58,237,.2); color: #c4b5fd; border-color: rgba(124,58,237,.3); }
  .pro-section .section-title { color: #fff; }
  .pro-section .section-sub { color: #9ca3af; }
  .pro-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
  }
  .pro-card {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: var(--r); padding: 24px;
    display: flex; gap: 16px; align-items: flex-start;
    transition: background .2s, border-color .2s;
    backdrop-filter: blur(8px);
  }
  .pro-card:hover { background: rgba(255,255,255,.09); border-color: rgba(124,58,237,.4); }
  .pro-card-icon {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(124,58,237,.5), rgba(79,70,229,.5));
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .pro-card-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 5px; }
  .pro-card-desc { font-size: 13px; color: #9ca3af; line-height: 1.55; }
  .pro-card-new {
    display: inline-block; background: var(--gold); color: var(--ink);
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: .06em; padding: 2px 7px; border-radius: 4px; margin-left: 6px;
    vertical-align: middle;
  }

  /* ── COMPARISON TABLE ────────────────────────────────────────────────── */
  .compare-section { background: var(--paper); }
  .compare-wrap { max-width: 820px; margin: 0 auto; }
  .compare-table { width: 100%; border-collapse: collapse; }
  .compare-table thead th {
    padding: 16px 20px; text-align: left; font-size: 13px; font-weight: 700;
    border-bottom: 2px solid var(--border);
  }
  .compare-table thead th:not(:first-child) { text-align: center; width: 120px; }
  .th-free { color: var(--muted); }
  .th-pro {
    color: #fff; background: linear-gradient(135deg, var(--pro), #4f46e5);
    border-radius: 10px 10px 0 0; position: relative;
  }
  .th-pro-label { font-size: 18px; display: block; }
  .compare-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  .compare-table tbody tr:hover { background: rgba(37,99,255,.03); }
  .compare-table td { padding: 14px 20px; font-size: 14px; }
  .compare-table td:not(:first-child) { text-align: center; }
  .check { color: var(--green); font-size: 18px; font-weight: 700; }
  .cross { color: #d1d5db; font-size: 18px; }
  .cat-row td { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); background: var(--cream); padding: 10px 20px; }
  .pro-col { background: rgba(124,58,237,.04); }

  /* ── TOOLBAR DEMO ────────────────────────────────────────────────────── */
  .demo-section { background: var(--cream); }
  .demo-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
  .demo-visual {
    position: relative; display: flex; justify-content: center;
  }
  .demo-phone {
    background: var(--ink); border-radius: 28px; width: 280px;
    box-shadow: var(--shadow-lg);
    overflow: hidden; border: 6px solid #1a1a2e;
  }
  .demo-phone-screen {
    background: #f5f3ee; min-height: 480px; position: relative; padding: 20px 16px;
  }
  .demo-lorem { background: #e5e1d8; border-radius: 4px; height: 10px; margin-bottom: 8px; }
  .demo-lorem.w60 { width: 60%; }
  .demo-lorem.w80 { width: 80%; }
  .demo-lorem.w40 { width: 40%; }
  .demo-toolbar-float {
    position: absolute; bottom: 16px; right: 16px;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 4px 16px rgba(37,99,255,.4);
    cursor: pointer; transition: transform .2s;
  }
  .demo-toolbar-float:hover { transform: scale(1.1); }
  .demo-panel-float {
    position: absolute; bottom: 76px; right: 8px;
    background: #fff; border-radius: 14px; width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
    overflow: hidden; font-size: 11px;
  }
  .dp-head { background: var(--accent); color: #fff; padding: 10px 14px; font-weight: 700; display: flex; justify-content: space-between; }
  .dp-section { padding: 8px 14px 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
  .dp-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 14px; border-bottom: 1px solid #f5f5f5; }
  .dp-name { font-weight: 500; color: #333; }
  .dp-toggle { width: 28px; height: 15px; border-radius: 8px; background: #e5e7eb; position: relative; cursor: pointer; }
  .dp-toggle.on { background: var(--accent); }
  .dp-toggle::after { content:''; position:absolute; width:11px; height:11px; border-radius:50%; background:#fff; top:2px; left:2px; transition:.2s; }
  .dp-toggle.on::after { left:15px; }
  .dp-lock { color: var(--pro); font-size: 10px; background: var(--pro-lt); border-radius: 4px; padding: 1px 5px; font-weight: 700; }

  .demo-text { }
  .demo-text h2 { margin-bottom: 20px; }
  .demo-text p { color: var(--muted); margin-bottom: 24px; font-weight: 300; font-size: 16px; }
  .demo-features { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .demo-feat {
    display: flex; align-items: flex-start; gap: 12px;
  }
  .demo-feat-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(37,99,255,.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .demo-feat-text strong { display: block; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .demo-feat-text span { font-size: 13px; color: var(--muted); }

  /* ── PRICING ─────────────────────────────────────────────────────────── */
  .pricing-section { background: var(--paper); }
  .pricing-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: start;
    max-width: 960px; margin: 0 auto;
  }
  .price-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 20px; padding: 36px 32px;
    transition: transform .2s;
  }
  .price-card:hover { transform: translateY(-4px); }
  .price-card.popular {
    border-color: var(--pro);
    background: linear-gradient(180deg, rgba(124,58,237,.03) 0%, #fff 40%);
    position: relative;
  }
  .popular-badge {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--pro), #4f46e5);
    color: #fff; border-radius: 50px; padding: 5px 18px;
    font-size: 12px; font-weight: 700; white-space: nowrap;
  }
  .price-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
  .price-amount { font-family: 'Fraunces', serif; font-weight: 900; font-size: 52px; line-height: 1; margin-bottom: 4px; }
  .price-amount span { font-size: 22px; font-weight: 400; vertical-align: top; margin-top: 8px; display: inline-block; }
  .price-period { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .price-desc { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .price-list { list-style: none; margin-bottom: 32px; display: flex; flex-direction: column; gap: 10px; }
  .price-list li { font-size: 14px; display: flex; align-items: flex-start; gap: 8px; }
  .price-list li::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; }
  .price-list li.locked { color: var(--muted); }
  .price-list li.locked::before { content: '✕'; color: #d1d5db; }
  .price-btn {
    display: block; text-align: center;
    padding: 14px; border-radius: 50px;
    font-size: 14px; font-weight: 700;
    transition: all .2s; cursor: pointer;
  }
  .price-btn-free { background: var(--paper); border: 2px solid var(--border); color: var(--ink); }
  .price-btn-free:hover { border-color: var(--ink); }
  .price-btn-pro { background: linear-gradient(135deg, var(--pro), #4f46e5); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,.3); }
  .price-btn-pro:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,.45); }
  .price-btn-agency { background: var(--ink); color: #fff; }
  .price-btn-agency:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(10,10,20,.25); }

  /* ── WCAG BANNER ─────────────────────────────────────────────────────── */
  .wcag-section { background: var(--cream); }
  .wcag-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .wcag-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 28px; text-align: center;
  }
  .wcag-level {
    font-family: 'Fraunces', serif; font-size: 48px; font-weight: 900;
    margin-bottom: 8px;
  }
  .wcag-level.A { color: var(--accent); }
  .wcag-level.AA { color: var(--pro); }
  .wcag-level.AAA { color: var(--gold); }
  .wcag-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .wcag-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* ── TESTIMONIALS ────────────────────────────────────────────────────── */
  .testi-section { background: var(--paper); }
  .testi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .testi-card {

  /* ── CTA FOOTER ──────────────────────────────────────────────────────── */
  .cta-section {
    background: var(--ink); color: #fff;
    text-align: center; padding: 120px 0;
    position: relative; overflow: hidden;
  }
  .cta-bg {
    position: absolute; inset: 0;

      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(37,99,255,.2) 0%, transparent 60%),

  .cta-inner { position: relative; z-index: 1; }
  .cta-section h2 { font-size: clamp(32px,4vw,56px); color: #fff; margin-bottom: 16px; }
  .cta-section p { font-size: 18px; color: #9ca3af; margin-bottom: 40px; font-weight: 300; }
  .cta-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #f59e0b); color: var(--ink); box-shadow: 0 4px 20px rgba(245,166,35,.4); }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,166,35,.5); }
  .btn-outline-white { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.25); }
  .btn-outline-white:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }

  /* ── FOOTER ──────────────────────────────────────────────────────────── */
  footer {
    background: #06060f; color: #4b5563;
    padding: 48px 0 32px;
    font-size: 13px;

  /* ── ANIMATIONS ──────────────────────────────────────────────────────── */

  .fade-up.visible { opacity: 1; transform: translateY(0); }
  .delay-1 { transition-delay: .1s; }

  .delay-3 { transition-delay: .3s; }
  .delay-4 { transition-delay: .4s; }

  /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
  @media (max-width: 900px) {

    .hero h1 { font-size: 36px; }

</style>

<script>
/* ── Intersection Observer for fade-up animations ─────────────────────── */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(el => {
    if (el.isIntersecting) {
      el.target.classList.add('visible');
      observer.unobserve(el.target);
    }
  });
}, { threshold: 0.12 });

document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

/* ── Smooth active nav highlight ──────────────────────────────────────── */
const sections = document.querySelectorAll('section[id]');
const navLinks  = document.querySelectorAll('.nav-links a[href^="#"]');
window.addEventListener('scroll', () => {
  let current = '';
  sections.forEach(s => {
    if (window.scrollY >= s.offsetTop - 80) current = s.id;
  });
  navLinks.forEach(a => {
    a.style.color = a.getAttribute('href') === '#' + current ? 'var(--ink)' : '';
    a.style.fontWeight = a.getAttribute('href') === '#' + current ? '700' : '';
  });
}, { passive: true });

/* ── Demo panel toggles ───────────────────────────────────────────────── */
document.querySelectorAll('.dp-toggle').forEach(t => {
  t.addEventListener('click', () => t.classList.toggle('on'));
});

/* ── Stagger hero text elements in ───────────────────────────────────── */
const heroEls = document.querySelectorAll('.hero-badge, .hero h1, .hero-sub, .hero-actions, .hero-stats');
heroEls.forEach((el, i) => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(20px)';
  el.style.transition = 'opacity .6s ease, transform .6s ease';
  el.style.transitionDelay = (i * 0.1) + 's';
  requestAnimationFrame(() => {
    setTimeout(() => { el.style.opacity = '1'; el.style.transform = ''; }, 50);
  });
});
</script>
